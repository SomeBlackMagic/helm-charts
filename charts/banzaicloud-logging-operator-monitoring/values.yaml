prometheus:
  # -- Create prometheus-operator resources
  enabled: true
  rule:
    # -- Optional Namespace for PrometheusRule resource
    namespace: ""
    # -- Additional Labels for PrometheusRule resource
    additionalLabels: {}
    alerts:

      fluentBit:
        serviceDown:
          enabled: true
          severity: critical
          for: 2m

        noOutputBytesProcessed:
          enabled: true
          severity: critical
          rateTime: 5m
          for: 20m

        noInputBytesProcessed:
          enabled: true
          severity: warning
          increaseTime: 10m
          for: 2h


      fluentd:
        serviceDown:
          enabled: true
          severity: critical
          for: 1m

        outputBufferWarning:
          enabled: true
          severity: warning
          lookbackTime: 5m
          threshold: 32
          for: 5m

        outputRetryWarning:
          enabled: true
          severity: warning
          rateTime: 1m
          threshold: 0.3
          for: 10m

        outputRetryErrors:
          enabled: true
          severity: error
          rateTime: 10m
          threshold: 0.05
          for: 5m

        outputBufferQueueLength:
          enabled: true
          severity: critical
          lookbackTime: 5m
          threshold: 8
          for: 5m

        highErrorRatio:
          enabled: true
          severity: critical
          rateTime: 5m
          threshold: 0.05
          for: 5m

        highRetryRatio:
          enabled: true
          severity: critical
          rateTime: 5m
          threshold: 0.05
          for: 5m



    # -- Add additional alerts to the group
    additionalAlerts: []
    # - alert: AppNotReady
    #   annotations:
    #     description: 'App for "{{`{{ $labels.name }}`}}" is not ready.'
    #     summary: condition is false
    #   expr: my_metric{condition="False"} == 1
    #   labels:
    #     severity: critical

grafana:
  # https://grafana.com/grafana/dashboards/7752

  # -- Enable deploying cert-manager dashboard to Grafana
  enabled: false
  # -- Add `grafana_dashboard: "1"` default label
  defaultLabel: true
  # -- Extra labels for dashboard ConfigMap
  extraLabels: {}
  # -- Extra annotations for dashboard ConfigMap
  extraAnnotations: {}
